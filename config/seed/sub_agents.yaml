# ArtiPivot 声明式子代理配置种子文件
#
# 作用：首次启动时加载，之后通过 REST API 动态管理，本文件不再参与运行时
# 用法：填写实际值后启动服务，只需配一次
#
# strategy 可选值: react | cot | function_calling
#   - react:             ReAct 循环（think → tools → think），适合复杂多步任务
#   - cot:               线性链（plan → execute → synthesize），适合可分解的结构化任务
#   - function_calling:  单次调用（LLM → tools → 结束），适合简单查询/转换

