# ArtiPivot 记忆系统配置种子文件
#
# 作用：首次启动时加载到 DocumentStore，之后通过 REST API 动态管理，本文件不再参与运行时
# 用法：填写实际值后启动服务，只需配一次

memory:
  # ─── 向量搜索（默认关闭） ──────────────────────────────
  embedding:
    enabled: false                    # 是否开启向量搜索
    provider: openai                  # 供应商: openai（兼容供应商同样填 openai）
    model: text-embedding-3-small     # embedding 模型名称
    dims: 1536                        # 向量维度（需与模型匹配）
    # base_url:                       # 可选，兼容供应商地址（如 https://api.deepseek.com）
    # api_key:                        # 可选，不填则读环境变量 OPENAI_API_KEY

  # ─── 上下文窗口管理 ──────────────────────────────────
  context_window:
    strategy: none                    # none | summarize | trim
    trigger_tokens: 100000            # 触发压缩的 token 阈值
    keep_messages: 20                 # 压缩后保留的最近消息数
    # summary_model:                  # 可选，摘要用的模型（默认用 agent 模型）
