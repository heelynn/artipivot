# ArtiPivot 模型配置种子文件
#
# 作用：首次启动时加载到 DocumentStore，之后通过 REST API 动态管理，本文件不再参与运行时
# 用法：填写实际值后启动服务，只需配一次

global:
  fallback_model:              # 全局兜底模型 — 所有 fallback 链的最终降级目标
    provider:                  # 必填，供应商协议: openai | anthropic
    name:                      # 必填，模型名称，由供应商定义
    # base_url:                # 可选，自定义 API 地址（适配兼容供应商 / 本地模型）
    # api_key:                 # 可选，显式 key（不填则读环境变量）
    # temperature: 0.0         # 可选，采样温度
    # timeout: 120             # 可选，超时秒数
    # max_tokens:              # 可选，最大输出 token
  defaults:
    temperature: 0.0
    timeout_seconds: 120

agents:
  <agent_id>:                  # 主 Agent 标识（自定义，需与 routing.yaml 一致）
    provider:                  # 必填
    name:                      # 必填
    # base_url:                # 可选
    # api_key:                 # 可选
    # temperature: 0.0
    # timeout: 120
    # max_tokens:
    sub_agents:
      <sub_agent_name>:        # 子代理标识（需与 routing.yaml 的 sub_agent 一致）
        provider:              # 必填
        name:                  # 必填
        # base_url:            # 可选
        # api_key:             # 可选
        # fallback:            # 可选，兜底模型（递归结构，支持多级降级）
        #   provider:
        #   name:
        #   fallback:          # 可继续嵌套
        #     provider:
        #     name:
