# agents.yaml — 单文件完整 Agent 定义，直接可执行
#
# 启动：artipivot serve
# YAML 在每次启动时直接读取，不走 DocumentStore 中转。
# 运行时通过 Admin API 的修改存在 DocumentStore 中，重启后仍生效。
#
# ─── 工具类型 ──────────────────────────────────────────
#   builtin: 快捷字符串，自动注册内置工具（web_search, code_exec, file_io）
#   module:  动态 import Python 函数，module.function 路径
#
# ─── 子代理策略 ────────────────────────────────────────
#   react:             ReAct 循环（think → tools → think），适合复杂多步任务
#   cot:               线性链（plan → execute → synthesize），适合可分解的结构化任务
#   function_calling:  单次调用（LLM → tools → 结束），适合简单查询
#   graph:             DSL 自定义拓扑，LLM / Tool / Transform / HITL 任意组合

# ─── 全局配置 ──────────────────────────────────────────
global:
  fallback_model:
    provider: openai
    name: gpt-4o-mini

# ─── 工具注册 ──────────────────────────────────────────
tools:
  web_search: builtin
  code_exec: builtin
  file_io: builtin
  # 自定义工具（module 模式）:
  # database_query:
  #   type: module
  #   module: my_project.tools
  #   function: query_database

# ─── Agent 定义 ────────────────────────────────────────
agents:
  code_agent:
    model:
      provider: anthropic
      name: claude-sonnet-4-6
      temperature: 0.0
      timeout: 120
    routing:
      confidence_threshold: 0.7
      intents:
        code_write: code_writer
        code_review: code_writer
        debug: code_writer
    sub_agents:
      code_writer:
        strategy: react
        tools: [web_search, code_exec, file_io]
        system_prompt: "You are a professional coding assistant."
        strategy_config:
          max_iterations: 5
    prompts:
      classify: "Classify the user message into one of: {intents}."
      respond: "Based on the sub-agent result, compose a helpful response."

  research_agent:
    model:
      provider: openai
      name: gpt-4o
      temperature: 0.0
    routing:
      confidence_threshold: 0.6
      intents:
        search: researcher
        summarize: researcher
    sub_agents:
      researcher:
        strategy: cot
        tools: [web_search]
        system_prompt: "You are a research assistant."
        strategy_config:
          max_plan_steps: 3
    prompts:
      classify: "Classify the user message into one of: search, summarize."
      respond: "Summarize the research findings for the user."
